<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Data Anak - SmartMom</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/calcullator-input.css">

</head>

<body class="bg-gray-200">

    <!-- NAVBAR -->
    <header class="flex items-center gap-3 px-10 py-6">

        <img src="img/logo.png" class="w-8">
        <h1 class="font-bold text-gray-700 tracking-wide">SMARTMOM</h1>

    </header>


    <div class="flex">

        <!-- SIDEBAR ICON -->
        <div class="flex flex-col gap-6 items-center pl-6 pt-16">

            <div class="side-icon"></div>
            <div class="side-icon active"></div>
            <div class="side-icon"></div>
            <div class="side-icon"></div>
            <div class="side-icon"></div>

        </div>


        <!-- CONTENT -->
        <div class="flex-1 px-10">

            <div class="flex justify-between mb-6">

                <h2 class="text-xl font-semibold flex items-center gap-2">
                    👶 Data Anak
                </h2>

                <p class="text-gray-600">
                    Lengkapi data untuk melihat <b>Growth Score</b>
                </p>

            </div>


            <div class="grid grid-cols-2 gap-10">

                <!-- DATA ANAK -->
                <div class="form-card">

                    <h3 class="form-title">Nama Anak</h3>
                    <input type="text" id="namaAnak" class="input">

                    <h3 class="form-title">Tanggal Lahir</h3>
                    <input type="date" id="tglLahir" class="input">

                    <p class="text-sm text-gray-500 mt-2">
                        Usia anak : 16 bulan
                    </p>

                    <h3 class="form-title mt-4">Jenis Kelamin</h3>

                    <div class="flex gap-4 mt-2">

                        <button class="gender girl">Perempuan</button>
                        <button class="gender boy">Laki-laki</button>

                    </div>

                    <h3 class="form-title mt-4">Tanggal Pengukuran</h3>
                    <input type="date" id="tglUkur" class="input">

                </div>


                <!-- DATA PENGUKURAN -->
                <div class="form-card">

                    <h3 class="text-lg font-semibold mb-4">
                        Data Pengukuran
                    </h3>

                    <label>Berat Badan (kg)</label>
                    <input type="number" id="berat" class="input">

                    <label>Tinggi badan (cm)</label>
                    <input type="number" id="tinggi" class="input">

                    <label>Lingkar kepala (cm)</label>
                    <input type="number" id="kepala" class="input">
                </div>

            </div>


            <!-- BUTTON -->
            <div class="flex justify-center mt-10 pb-10">

                <button class="btn-main" id="btnSimpan">
                    Mulai hitung sekarang
                </button>

            </div>

        </div>
    </div>

    <script src="/js/calcullator-input.js"></script>
    <script>

        /* =========================
        DATABASE CALCULATOR INPUT
        ========================= */

        const btn = document.getElementById("btnSimpan");

        btn.addEventListener("click", function () {

            const nama = document.getElementById("namaAnak").value;
            const tglLahir = document.getElementById("tglLahir").value;
            const tglUkur = document.getElementById("tglUkur").value;

            const berat = document.getElementById("berat").value;
            const tinggi = document.getElementById("tinggi").value;
            const kepala = document.getElementById("kepala").value;


            /* buat object database */

            const dataAnak = {

                nama: nama,
                tglLahir: tglLahir,
                tglUkur: tglUkur,

                pengukuran: {

                    berat: berat,
                    tinggi: tinggi,
                    kepala: kepala

                }

            };


            /* simpan database */

            localStorage.setItem("data_anak", JSON.stringify(dataAnak));


            /* pindah ke halaman analisis */

            window.location.href = "calcullator-analisis.html";

        });

    </script>
</body>

</html>
